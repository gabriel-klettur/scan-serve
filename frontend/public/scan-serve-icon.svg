<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="16" cy="16" r="14" fill="url(#bgGradient)" opacity="0.1"/>
  <circle cx="16" cy="16" r="14" stroke="url(#bgGradient)" stroke-width="1.5" fill="none"/>
  
  <!-- Document/Paper representation -->
  <rect x="8" y="6" width="16" height="20" rx="1.5" fill="white" stroke="url(#bgGradient)" stroke-width="1.5"/>
  
  <!-- OCR text lines -->
  <rect x="10" y="9" width="8" height="1" rx="0.5" fill="url(#bgGradient)" opacity="0.8"/>
  <rect x="10" y="12" width="12" height="1" rx="0.5" fill="url(#bgGradient)" opacity="0.6"/>
  <rect x="10" y="15" width="10" height="1" rx="0.5" fill="url(#bgGradient)" opacity="0.7"/>
  <rect x="10" y="18" width="11" height="1" rx="0.5" fill="url(#bgGradient)" opacity="0.5"/>
  
  <!-- AI/Scan overlay -->
  <circle cx="20" cy="10" r="3" fill="url(#accentGradient)" opacity="0.9"/>
  <path d="M19 10 L20 9 L21 10 L20 11 Z" fill="white"/>
  
  <!-- Scan line effect -->
  <rect x="9" y="21" width="14" height="0.5" fill="url(#accentGradient)" opacity="0.8">
    <animate attributeName="y" values="21;9;21" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>
